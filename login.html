<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOVE | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="login-layout">
    <section class="hero-panel">
      <div class="hero-overlay"></div>
      <h1>Seu próximo momento<br />inesquecível começa aqui.</h1>
    </section>

    <section class="form-panel">
      <div class="vertical-line left"></div>
      <div class="vertical-line right"></div>

      <article class="login-card">
        <h2>Entrar</h2>
        <form>
          <input type="email" placeholder="Digite seu e-mail" aria-label="Digite seu e-mail" />
          <input type="password" placeholder="Digite sua senha" aria-label="Digite sua senha" />

          <button class="primary-btn" type="submit">Entrar</button>

          <button class="google-btn" type="button">
            <span class="google-icon">G</span>
            <span>Continuar com o Google</span>
          </button>

          <p class="signup-link">Não possui conta? Clique aqui</p>
        </form>
      </article>

      <footer class="logo-footer" aria-label="MOVE">
        <span class="logo-mark">∿</span>
        <span class="logo-text">MOVE</span>
      </footer>
    </section>
  </main>
</body>
</html>
