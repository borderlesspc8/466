<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil do Fornecedor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue-950: #031734;
      --blue-900: #071b37;
      --blue-700: #0f2d57;
      --gray-50: #f1f1f3;
      --gray-100: #ececef;
      --gray-200: #dedee2;
      --gray-400: #adadb6;
      --gray-700: #313138;
      --danger: #ef3c2f;
      --gold: #dba220;
      --white: #fff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background: var(--gray-50);
      color: #1f1f24;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 58px;
      padding: 0 24px 0 46px;
      background: linear-gradient(90deg, var(--blue-950) 0%, var(--blue-900) 82%, #1762c4 100%);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .brand-logo {
      width: 200px;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .topbar-nav {
      display: flex;
      align-items: center;
      gap: 48px;
    }

    .topbar-nav a {
      color: #f5f7fb;
      text-decoration: none;
      font-size: 33px;
      line-height: 1;
      font-weight: 400;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-user {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid #d8e6fb;
      display: grid;
      place-items: center;
      color: #d8e6fb;
      font-size: 22px;
      font-weight: 700;
    }

    .logout-btn-top {
      border: 1px solid rgba(255, 255, 255, 0.36);
      background: transparent;
      color: #eef1f8;
      border-radius: 6px;
      font-size: 12px;
      padding: 7px 12px;
      cursor: pointer;
    }

    .profile-layout {
      display: grid;
      grid-template-columns: 37% 1fr;
      min-height: calc(100vh - 58px);
    }

    .sidebar {
      padding: 28px 28px 24px 46px;
      border-right: 1px solid var(--gray-200);
    }

    .sidebar h1 {
      margin: 0 0 24px;
      font-size: 45px;
      font-weight: 700;
      color: #121218;
    }

    .sidebar-menu {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 56px;
      color: #1f2630;
      font-size: 21px;
      font-weight: 500;
    }

    .menu-item svg {
      width: 34px;
      height: 34px;
      stroke: #0b213f;
      fill: none;
      stroke-width: 2;
      flex-shrink: 0;
    }

    .menu-item.active .menu-avatar {
      background: #0f2d57;
      color: #fff;
    }

    .menu-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 33px;
      font-weight: 700;
      background: #fff;
      border: 2px solid #102844;
      color: #102844;
      line-height: 1;
    }

    .menu-item.logout {
      color: var(--danger);
      margin-top: 8px;
      cursor: pointer;
    }

    .menu-item.logout svg {
      stroke: var(--danger);
    }

    .content-area {
      padding: 28px 44px;
    }

    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .content-header h2 {
      margin: 0;
      font-size: 46px;
      font-weight: 700;
      color: #131319;
    }

    .edit-btn {
      min-width: 82px;
      border: 0;
      background: #ceced2;
      color: #52525b;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
    }

    .profile-top-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 22px;
      min-height: 162px;
    }

    .profile-identity {
      text-align: center;
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin: 0 auto 10px;
      display: grid;
      place-items: center;
      background: #0f2d57;
      color: #fff;
      font-size: 40px;
      font-weight: 700;
    }

    .profile-name {
      margin: 0;
      font-size: 38px;
      font-weight: 500;
      line-height: 1.1;
      color: #1f1f24;
    }

    .profile-role {
      margin: 0;
      font-size: 18px;
      color: #8a8a92;
      font-weight: 400;
    }

    .info-list {
      display: grid;
      gap: 10px;
    }

    .info-item {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      padding: 11px 16px;
    }

    .info-label {
      display: block;
      font-size: 15px;
      color: #a8a8af;
      margin-bottom: 3px;
    }

    .info-value {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      color: #1f1f24;
      font-weight: 500;
      word-break: break-word;
    }

    @media (max-width: 1280px) {
      .brand-logo {
        width: 160px;
      }

      .topbar-nav {
        gap: 24px;
      }

      .topbar-nav a {
        font-size: 22px;
      }

      .sidebar h1,
      .content-header h2 {
        font-size: 34px;
      }

      .menu-item {
        font-size: 18px;
      }

      .info-value,
      .profile-name {
        font-size: 27px;
      }
    }

    @media (max-width: 980px) {
        /* mobile: content first, sidebar (menu) after */
        .profile-layout {
          display: flex;
          flex-direction: column;
        }

        .content-area {
          order: 1;
        }

        .sidebar {
          order: 2;
        }

        flex-wrap: wrap;
        row-gap: 10px;
        padding: 10px 16px;
      }

      .topbar-nav {
        width: 100%;
        justify-content: center;
        order: 3;
        flex-wrap: wrap;
        gap: 14px;
      }

      .topbar-nav a {
        font-size: 18px;
      }

      .profile-layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--gray-200);
        padding: 22px 16px;
      }

      .content-area {
        padding: 24px 16px 40px;
      }

      .sidebar h1,
      .content-header h2 {
        font-size: 30px;
      }

      .profile-name,
      .info-value {
        font-size: 24px;
      }
    }

    @media (max-width: 640px) {
      .topbar {
        justify-content: center;
        row-gap: 8px;
      }

      .brand-logo {
        width: 130px;
      }

      .topbar-actions {
        width: 100%;
        justify-content: space-between;
      }

      .topbar-nav {
        gap: 8px;
      }

      .topbar-nav a {
        font-size: 16px;
      }

      .topbar-user {
        width: 36px;
        height: 36px;
      }

      .logout-btn-top {
        min-height: 36px;
        padding: 8px 14px;
      }

      .sidebar h1,
      .content-header h2 {
        font-size: 26px;
      }

      .menu-item {
        font-size: 16px;
        min-height: 48px;
      }

      .menu-avatar {
        width: 34px;
        height: 34px;
        font-size: 15px;
      }

      .menu-item svg {
        width: 28px;
        height: 28px;
      }

      .profile-avatar {
        width: 62px;
        height: 62px;
        font-size: 24px;
      }

      .content-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .edit-btn {
        width: 100%;
        min-height: 40px;
      }

      .profile-top-card {
        padding: 18px 14px;
      }

      .profile-name,
      .info-value {
        font-size: 20px;
      }

      .info-item {
        padding: 10px 12px;
      }
    }

    @media (max-width: 420px) {
      .topbar {
        padding: 10px 12px;
      }

      .topbar-nav {
        justify-content: flex-start;
      }

      .topbar-nav a {
        font-size: 15px;
      }

      .content-area,
      .sidebar {
        padding-left: 12px;
        padding-right: 12px;
      }

      .profile-name,
      .info-value {
        font-size: 18px;
      }

      .info-label {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a class="brand" href="landing-b2b.html">
      <img class="brand-logo" src="assets/move-logo.svg" alt="M.O.V.E." />
    </a>

    <nav class="topbar-nav" aria-label="Navegação principal">
      <a href="#">Anúncios</a>
      <a href="#">Reservas</a>
      <a href="#">Novo anúncio</a>
      <a href="#">Central de Ajuda</a>
      <a href="#">Configurações</a>
    </nav>

    <div class="topbar-actions">
      <button class="logout-btn-top" id="logout-btn-top">Sair</button>
      <div class="topbar-user" id="header-avatar">U</div>
    </div>
  </header>

  <main class="profile-layout">
    <aside class="sidebar">
      <h1>Perfil</h1>

      <ul class="sidebar-menu">
        <li class="menu-item active">
          <span class="menu-avatar" id="menu-avatar">LB</span>
          <span>Sobre mim</span>
        </li>
        <li class="menu-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 2h9l3 3v17H6z" /><path d="M15 2v4h4" /><path d="M9 11h6" /><path d="M9 15h6" /><path d="M9 19h4" /></svg>
          <span>Aluguéis anteriores</span>
        </li>
        <li class="menu-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 13h18l-1 6H4z" /><path d="M5 13l2-5h10l2 5" /><circle cx="8" cy="18" r="1" /><circle cx="16" cy="18" r="1" /></svg>
          <span>Anúncios ativos</span>
        </li>
        <li class="menu-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2" /><path d="M16 9h2" /><path d="M6 15h5" /></svg>
          <span>Pagamentos</span>
        </li>
        <li class="menu-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" /><path d="M9.5 9a2.5 2.5 0 1 1 4.3 1.8c-.8.8-1.8 1.2-1.8 2.7" /><circle cx="12" cy="17" r=".8" /></svg>
          <span>Central de Ajuda</span>
        </li>
        <li class="menu-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a2 2 0 0 1 0 2.8 2 2 0 0 1-2.8 0l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a2 2 0 0 1-4 0v-.2a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a2 2 0 0 1-2.8 0 2 2 0 0 1 0-2.8l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4a2 2 0 0 1 0-4h.2a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a2 2 0 0 1 0-2.8 2 2 0 0 1 2.8 0l.1.1a1 1 0 0 0 1.1.2h.1a1 1 0 0 0 .6-.9V4a2 2 0 0 1 4 0v.2a1 1 0 0 0 .6.9h.1a1 1 0 0 0 1.1-.2l.1-.1a2 2 0 0 1 2.8 0 2 2 0 0 1 0 2.8l-.1.1a1 1 0 0 0-.2 1.1v.1a1 1 0 0 0 .9.6H20a2 2 0 0 1 0 4h-.2a1 1 0 0 0-.4.1z" /></svg>
          <span>Configurações</span>
        </li>
        <li class="menu-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" /><path d="M12 8v.1" /><path d="M12 11v5" /></svg>
          <span>Sobre</span>
        </li>
        <li class="menu-item logout" id="logout-sidebar">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 17l5-5-5-5" /><path d="M15 12H4" /><path d="M20 4h-5" /><path d="M20 20h-5" /></svg>
          <span>Sair da conta</span>
        </li>
      </ul>
    </aside>

    <section class="content-area">
      <div class="content-header">
        <h2>Sobre mim</h2>
        <button class="edit-btn" type="button">Editar</button>
      </div>

      <article class="profile-top-card">
        <div class="profile-identity">
          <div class="profile-avatar" id="profile-avatar">LB</div>
          <p class="profile-name" id="profile-name">Laura</p>
          <p class="profile-role" id="profile-role">Fornecedor</p>
        </div>
      </article>

      <div class="info-list" id="info-list"></div>
    </section>
  </main>

  <script>
    const raw = localStorage.getItem('move_user');

    const roleProfiles = {
      'Dono de equipamento': {
        profileRole: 'Fornecedor',
        defaultName: 'Laura Padilha Bueno',
        defaultEmail: 'laurapadilhabueno@hotmail.com',
        fields: [
          { label: 'Nome', value: 'Laura Padilha Bueno' },
          { label: 'E-mail', value: 'laurapadilhabueno@hotmail.com' },
          { label: 'Data de nascimento', value: '04/05/2005' },
          { label: 'Telefone', value: '+ 55 (41) 99764-8921' },
          { label: 'Cidade / Estado', value: 'São Paulo, São Paulo' },
          { label: 'CPF', value: '094.**.***-**' }
        ]
      },
      'Lojistas': {
        profileRole: 'Lojista',
        defaultName: 'Loja Boa Onda',
        defaultEmail: 'contato@lojaboaonda.com.br',
        fields: [
          { label: 'Nome da loja', value: 'Loja Boa Onda' },
          { label: 'E-mail', value: 'contato@lojaboaonda.com.br' },
          { label: 'Telefone', value: '+ 55 (11) 98888-4545' },
          { label: 'Cidade / Estado', value: 'Florianópolis, Santa Catarina' },
          { label: 'CNPJ', value: '48.***.***/0001-**' },
          { label: 'Categoria', value: 'Loja parceira de equipamentos e experiências' }
        ]
      },
      'Aventureiro': {
        profileRole: 'Aventureiro',
        defaultName: 'Lucas Aventura',
        defaultEmail: 'lucas@move.com',
        fields: [
          { label: 'Nome', value: 'Lucas Aventura' },
          { label: 'E-mail', value: 'lucas@move.com' },
          { label: 'Data de nascimento', value: '17/08/1997' },
          { label: 'Telefone', value: '+ 55 (21) 99999-1212' },
          { label: 'Cidade / Estado', value: 'Rio de Janeiro, Rio de Janeiro' },
          { label: 'Perfil', value: 'Usuário apaixonado por experiências ao ar livre' }
        ]
      }
    };

    const renderInfoFields = (fields) => {
      const infoList = document.getElementById('info-list');
      infoList.innerHTML = fields
        .map(
          (field) => `
            <article class="info-item">
              <span class="info-label">${field.label}</span>
              <p class="info-value">${field.value}</p>
            </article>
          `
        )
        .join('');
    };

    if (!raw) {
      window.location.href = 'login.html';
    } else {
      const user = JSON.parse(raw);
      const selectedProfile = roleProfiles[user.role] || roleProfiles['Dono de equipamento'];
      const fullName = user.nome || selectedProfile.defaultName;
      const shortName = fullName.split(' ')[0] || 'Laura';
      const initials = fullName
        .split(' ')
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0].toUpperCase())
        .join('');

      document.getElementById('header-avatar').textContent = (initials || 'LP').slice(0, 2);
      document.getElementById('menu-avatar').textContent = (initials || 'LP').slice(0, 2);
      document.getElementById('profile-avatar').textContent = (initials || 'LP').slice(0, 2);
      document.getElementById('profile-name').textContent = shortName;
      document.getElementById('profile-role').textContent = selectedProfile.profileRole;

      const fields = selectedProfile.fields.map((field) => {
        if (field.label === 'Nome' || field.label === 'Nome da loja') {
          return { ...field, value: fullName };
        }

        if (field.label === 'E-mail') {
          return { ...field, value: user.email || selectedProfile.defaultEmail };
        }

        return field;
      });

      renderInfoFields(fields);
    }

    const logout = () => {
      localStorage.removeItem('move_user');
      window.location.href = 'login.html';
    };

    document.getElementById('logout-btn-top').addEventListener('click', logout);
    document.getElementById('logout-sidebar').addEventListener('click', logout);
    document.getElementById('logout-sidebar').addEventListener('keypress', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        logout();
      }
    });
  </script>
</body>
</html>
