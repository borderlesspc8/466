<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Pagamento não processado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f2f3f5;
      --card: #ffffff;
      --line: #dce1ea;
      --blue: #021f58;
      --text: #1b2232;
      --red: #ef443a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: Inter, Arial, sans-serif; background: var(--bg); color: var(--text); }
    .header {
      height: 84px;
      background: linear-gradient(90deg, #04163a 0%, #062967 70%, #0a3a8e 100%);
      display: flex;
      align-items: center;
      padding: 0 14px;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: "";
      position: absolute;
      right: -18px;
      top: -8px;
      width: 94px;
      height: 116px;
      border-radius: 50%;
      background: radial-gradient(circle at 28% 35%, rgba(78, 132, 255, 0.5), rgba(28, 78, 182, 0.35) 56%, rgba(16, 43, 105, 0) 74%);
    }
    .logo { height: 30px; width: auto; z-index: 1; }
    .page { min-height: calc(100dvh - 84px); padding: 74px 6px 96px; }
    .card {
      background: var(--card);
      border: 1px solid #d8dee9;
      border-radius: 10px;
      min-height: 246px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 12px;
      box-shadow: 0 2px 6px rgba(20, 35, 65, 0.08);
    }
    .status {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 34px;
      font-weight: 700;
      line-height: 1;
    }
    .message { margin: 0; font-size: 32px; font-weight: 500; }
    .finish {
      position: fixed;
      left: 6px;
      right: 6px;
      bottom: 44px;
      height: 36px;
      border: 0;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font-size: 26px;
      font-weight: 600;
      cursor: pointer;
    }
    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 44px;
      background: #fff;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-around;
      font-size: 10px;
      color: #0f1a2f;
    }
    .nav-item { display: grid; justify-items: center; gap: 2px; min-width: 56px; }
    .nav-icon { font-size: 16px; line-height: 1; }
  </style>
</head>
<body>
  <header class="header">
    <img class="logo" src="assets/move-logo.svg" alt="MOVE" />
  </header>
  <main class="page">
    <section class="card">
      <div class="status">×</div>
      <p class="message">Pagamento não processado.</p>
    </section>
  </main>
  <button class="finish" type="button" onclick="window.location.href='payment.html'">Finalizar</button>
  <nav class="bottom-nav" aria-label="Navegação inferior">
    <div class="nav-item"><span class="nav-icon">⌕</span><span>Explorar</span></div>
    <div class="nav-item"><span class="nav-icon">📄</span><span>Reservas</span></div>
    <div class="nav-item"><span class="nav-icon">💬</span><span>Mensagens</span></div>
    <div class="nav-item"><span class="nav-icon">◌</span><span>Meu perfil</span></div>
  </nav>
</body>
</html>
