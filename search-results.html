<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="move-api-base" content="" />
  <title>Resultados da busca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #ebedef;
      --text: #22344d;
      --muted: #768195;
      --navy: #041a3d;
      --bottom-h: 62px;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      min-height: 100dvh;
      padding-bottom: var(--bottom-h);
    }

    .top {
      background: linear-gradient(90deg, #051735 0%, #07234f 60%, #0a3989 100%);
      padding: 14px 14px 12px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .logo {
      height: 24px;
      width: auto;
      display: block;
    }

    .toolbar {
      padding: 10px 10px 8px;
    }

    .toolbar-card {
      background: #eceef1;
      border: 1px solid #d4dae4;
      border-radius: 15px;
      min-height: 44px;
      display: grid;
      grid-template-columns: 20px 1fr 20px;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      box-shadow: 0 2px 6px rgba(12, 22, 35, 0.06);
    }

    .back,
    .filter-btn {
      border: 0;
      background: transparent;
      color: #2c3e57;
      width: 20px;
      height: 20px;
      font-size: 15px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .toolbar-main {
      text-align: center;
      min-width: 0;
    }

    .toolbar-title {
      margin: 0;
      font-size: 14px;
      color: #2b3d56;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar-sub {
      margin: 1px 0 0;
      font-size: 9px;
      color: #9098a8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list {
      display: grid;
      gap: 10px;
      padding: 2px 10px 12px;
    }

    .item {
      position: relative;
      height: 120px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(12, 23, 39, 0.14);
      background: #1e385b;
      display: grid;
      grid-template-columns: 110px 1fr;
    }

    .item-image {
      position: relative;
      overflow: hidden;
      background: #1e385b;
    }

    .item-image::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("assets/login-bg.png") center/cover no-repeat;
      transform: scale(1.05);
      filter: saturate(1.1);
    }

    .item-image.has-cover::before {
      display: none;
    }

    .item-cover {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .list-status {
      padding: 16px 14px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .list-status.error {
      color: #b42318;
    }

    .item-content {
      position: relative;
      z-index: 1;
      padding: 8px 8px 8px 10px;
      color: #fff;
      background: linear-gradient(90deg, rgba(7, 56, 93, 0.65) 0%, rgba(7, 56, 93, 0.95) 40%);
    }

    .item-title {
      margin: 0;
      font-size: 29px;
      line-height: 0.85;
      letter-spacing: -0.8px;
      font-weight: 500;
      color: #d7e6fa;
    }

    .item-rate {
      margin-top: 3px;
      font-size: 9px;
      color: #f0c56d;
      font-weight: 600;
    }

    .item-loc {
      margin-top: 3px;
      font-size: 10px;
      color: #c6d5ea;
      line-height: 1.2;
    }

    .item-price {
      margin-top: 2px;
      font-size: 35px;
      line-height: 0.9;
      letter-spacing: -0.8px;
      color: #eaf3ff;
    }

    .item-price small {
      font-size: 11px;
      color: #c7d7eb;
      letter-spacing: 0;
    }

    .item-actions {
      margin-top: 6px;
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .ghost-btn,
    .primary-btn {
      min-height: 23px;
      border-radius: 10px;
      border: 0;
      padding: 0 10px;
      font-size: 9px;
      cursor: pointer;
    }

    .ghost-btn {
      background: rgba(238, 244, 251, 0.9);
      color: #38557a;
    }

    .primary-btn {
      background: #06234f;
      color: #fff;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      min-height: var(--bottom-h);
      background: #f9fbff;
      border-top: 1px solid #dde3ec;
      display: flex;
      align-items: center;
      z-index: 30;
    }

    .tab {
      flex: 1;
      border: 0;
      background: transparent;
      color: #4f5e73;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      min-height: var(--bottom-h);
      font-size: 9px;
      cursor: pointer;
      font-family: inherit;
    }

    .tab svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
    }

    .tab.active {
      color: #0f223f;
      font-weight: 600;
    }

    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(6, 14, 28, 0.45);
      z-index: 39;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .sheet-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .filter-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: var(--bottom-h);
      z-index: 40;
      background: #f5f5f6;
      border-top-left-radius: 22px;
      border-top-right-radius: 22px;
      padding: 14px 12px 12px;
      transform: translateY(105%);
      transition: transform 0.22s ease;
      box-shadow: 0 -8px 20px rgba(5, 15, 31, 0.2);
    }

    .filter-sheet.open {
      transform: translateY(0);
    }

    .sheet-title {
      margin: 0 0 10px;
      font-size: 31px;
      line-height: 1;
      letter-spacing: -0.6px;
      font-weight: 500;
      color: #1f3048;
    }

    .sheet-label {
      margin: 0 0 8px;
      color: #6f7888;
      font-size: 12px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .tag {
      border: 1px solid #d3d9e3;
      background: #f7f8fa;
      color: #8a93a3;
      min-height: 24px;
      border-radius: 999px;
      padding: 0 10px;
      font-size: 10px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      font-family: inherit;
    }

    .tag.active {
      background: #041a3d;
      border-color: #041a3d;
      color: #fff;
    }

    .price-area {
      margin-top: 6px;
    }

    .hist {
      height: 30px;
      border-bottom: 2px solid #d6dbe4;
      display: flex;
      align-items: flex-end;
      gap: 2px;
      overflow: hidden;
    }

    .bar {
      width: 4px;
      background: #d69743;
      border-radius: 2px 2px 0 0;
    }

    .bar.light {
      background: #d6d9df;
    }

    .range {
      margin-top: -2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .range input {
      width: 48%;
      accent-color: #d69743;
    }

    .price-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      color: #969eab;
      font-size: 10px;
    }

    .price-values {
      display: flex;
      justify-content: space-between;
      margin-top: 2px;
      color: #0f223f;
      font-size: 12px;
      font-weight: 600;
    }

    .sheet-actions {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cancel {
      border: 0;
      background: #b8bbc2;
      color: #fff;
      min-height: 28px;
      border-radius: 999px;
      padding: 0 14px;
      font-size: 12px;
      cursor: pointer;
    }

    .apply {
      border: 0;
      background: #041a3d;
      color: #fff;
      min-height: 30px;
      border-radius: 999px;
      padding: 0 14px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <img class="logo" src="assets/move-logo.svg" alt="MOVE" />
    </header>

    <section class="toolbar">
      <div class="toolbar-card">
        <button class="back" type="button" onclick="history.back()" aria-label="Voltar">←</button>
        <div class="toolbar-main">
          <p class="toolbar-title" id="toolbar-title">Lanchas por perto</p>
          <p class="toolbar-sub" id="toolbar-sub">Busca</p>
        </div>
        <button class="filter-btn" id="open-filter" type="button" aria-label="Filtrar">⚚</button>
      </div>
    </section>

    <main class="list" id="results-root" aria-label="Resultados da busca">
      <p class="list-status" id="results-status">Carregando…</p>
    </main>

    <div class="sheet-overlay" id="sheet-overlay"></div>
    <section class="filter-sheet" id="filter-sheet" aria-label="Filtros">
      <h2 class="sheet-title">Filtrar</h2>
      <p class="sheet-label">Ordenar por:</p>
      <div class="tags" id="order-tags">
        <button type="button" class="tag active" data-order="relevance">Relevancia</button>
        <button type="button" class="tag" data-order="price_asc">Preco menor</button>
        <button type="button" class="tag" data-order="price_desc">Preco maior</button>
        <button type="button" class="tag" data-order="rating_desc">Avaliacoes</button>
      </div>

      <p class="sheet-label">Faixa de preco:</p>
      <div class="price-area">
        <div class="hist">
          <span class="bar" style="height: 7px;"></span><span class="bar" style="height: 12px;"></span><span class="bar" style="height: 16px;"></span>
          <span class="bar" style="height: 22px;"></span><span class="bar" style="height: 15px;"></span><span class="bar" style="height: 18px;"></span>
          <span class="bar" style="height: 24px;"></span><span class="bar" style="height: 14px;"></span><span class="bar" style="height: 18px;"></span>
          <span class="bar" style="height: 28px;"></span><span class="bar" style="height: 17px;"></span><span class="bar" style="height: 20px;"></span>
          <span class="bar" style="height: 26px;"></span><span class="bar" style="height: 23px;"></span><span class="bar" style="height: 18px;"></span>
          <span class="bar" style="height: 21px;"></span><span class="bar" style="height: 24px;"></span><span class="bar" style="height: 18px;"></span>
          <span class="bar" style="height: 26px;"></span><span class="bar" style="height: 23px;"></span><span class="bar light" style="height: 27px;"></span>
          <span class="bar light" style="height: 18px;"></span><span class="bar light" style="height: 22px;"></span><span class="bar light" style="height: 15px;"></span>
        </div>
        <div class="range">
          <input type="range" min="160" max="800" value="160" />
          <input type="range" min="160" max="800" value="800" />
        </div>
        <div class="price-labels"><span>Minimo</span><span>Maximo</span></div>
        <div class="price-values"><span>R$ 160</span><span>R$ 800+</span></div>
      </div>

      <div class="sheet-actions">
        <button class="cancel" id="cancel-filter" type="button">✕ Cancelar</button>
        <button class="apply" id="apply-filter" type="button">Pesquisar ➤</button>
      </div>
    </section>

    <nav class="bottom-nav" aria-label="Navegacao principal">
      <button class="tab active" type="button" aria-current="page" onclick="window.location.href='home-v2.html'">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Explorar</span>
      </button>
      <button class="tab" type="button" onclick="window.location.href='booking-confirm.html'">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Reservas</span>
      </button>
      <button class="tab" type="button" onclick="window.location.href='chat-owner.html'">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Mensagens</span>
      </button>
      <button class="tab" type="button" onclick="window.location.href='dashboard.html'">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Meu perfil</span>
      </button>
    </nav>
  </div>

  <script src="js/move-api.js"></script>
  <script>
    function getSearchParams() {
      return new URLSearchParams(window.location.search);
    }

    const resultsRoot = document.getElementById("results-root");
    const toolbarTitle = document.getElementById("toolbar-title");
    const toolbarSub = document.getElementById("toolbar-sub");
    const orderTags = document.getElementById("order-tags");

    const titleByType = {
      lancha: "Lanchas por perto",
      jetski: "Jetski por perto",
      quadriciclo: "Quadriciclos por perto",
      utv: "UTVs por perto"
    };

    let orderBy = getSearchParams().get("orderBy") || "relevance";

    function formatBRL(amount) {
      var n = typeof amount === "number" ? amount : parseFloat(amount);
      if (isNaN(n)) return "—";
      return n.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }

    function bookingUnitLabel(unit) {
      var map = { minutes: "por período", hourly: "por hora", daily: "por dia", fixed: "preço fixo" };
      return map[unit] || "por dia";
    }

    function syncOrderTagButtons() {
      orderTags.querySelectorAll(".tag").forEach(function (btn) {
        btn.classList.toggle("active", btn.getAttribute("data-order") === orderBy);
      });
    }

    function buildSearchBody() {
      var p = getSearchParams();
      var locationId = p.get("locationId") || "";
      var body = {
        listingType: "vehicle",
        orderBy: orderBy,
        highlight: false,
        page: { limit: 24 }
      };
      if (locationId) body.locationId = locationId;
      return body;
    }

    function resolveCategoryIdFromSlug() {
      var p = getSearchParams();
      var slug = (p.get("type") || "").toLowerCase();
      if (!slug) return Promise.resolve("");
      return MoveApi.getCategories({ type: "vehicle_rental" }).then(function (data) {
        var items = (data && data.items) || [];
        var hint = titleByType[slug] || slug;
        var found = items.find(function (c) {
          return (c.name || "").toLowerCase().indexOf(slug) !== -1;
        });
        if (found) return found.id || "";
        found = items.find(function (c) {
          return hint && (c.name || "").toLowerCase().indexOf(hint.split(" ")[0].toLowerCase()) !== -1;
        });
        return found && found.id ? found.id : "";
      });
    }

    function renderListingCard(it) {
      var article = document.createElement("article");
      article.className = "item";
      var imgWrap = document.createElement("div");
      imgWrap.className = "item-image";
      if (it.coverImageUrl) {
        imgWrap.classList.add("has-cover");
        var img = document.createElement("img");
        img.className = "item-cover";
        img.src = it.coverImageUrl;
        img.alt = "";
        img.loading = "lazy";
        imgWrap.appendChild(img);
      }
      var content = document.createElement("div");
      content.className = "item-content";
      var title = document.createElement("p");
      title.className = "item-title";
      title.textContent = it.title || "Anúncio";
      var rate = document.createElement("p");
      rate.className = "item-rate";
      rate.textContent = (it.rating != null ? Number(it.rating).toFixed(1) : "—") + " ★";
      var loc = document.createElement("p");
      loc.className = "item-loc";
      loc.textContent = "📍 " + (it.locationLabel || "Local a combinar");
      var price = document.createElement("p");
      price.className = "item-price";
      var small = document.createElement("small");
      small.textContent = bookingUnitLabel(it.bookingUnit);
      price.appendChild(document.createTextNode(formatBRL(it.fixedPrice) + " "));
      price.appendChild(small);
      var actions = document.createElement("div");
      actions.className = "item-actions";
      var detailBtn = document.createElement("button");
      detailBtn.type = "button";
      detailBtn.className = "ghost-btn";
      detailBtn.textContent = "Ver detalhes";
      detailBtn.addEventListener("click", function () {
        window.location.href = "booking-confirm.html?listingId=" + encodeURIComponent(it.id);
      });
      var rentBtn = document.createElement("button");
      rentBtn.type = "button";
      rentBtn.className = "primary-btn";
      rentBtn.textContent = "Alugar";
      rentBtn.addEventListener("click", function () {
        window.location.href = "booking-confirm.html?listingId=" + encodeURIComponent(it.id);
      });
      actions.appendChild(detailBtn);
      actions.appendChild(rentBtn);
      content.appendChild(title);
      content.appendChild(rate);
      content.appendChild(loc);
      content.appendChild(price);
      content.appendChild(actions);
      article.appendChild(imgWrap);
      article.appendChild(content);
      return article;
    }

    function runSearch() {
      resultsRoot.querySelectorAll(".item, .list-status").forEach(function (n) {
        n.remove();
      });
      var loading = document.createElement("p");
      loading.className = "list-status";
      loading.id = "results-status";
      loading.textContent = "Carregando…";
      resultsRoot.appendChild(loading);

      var p = getSearchParams();
      var fromUrl = p.get("categoryId") || "";
      var categoryPromise = fromUrl ? Promise.resolve(fromUrl) : resolveCategoryIdFromSlug();

      categoryPromise
        .then(function (resolvedId) {
          var body = buildSearchBody();
          if (resolvedId) body.categoryIds = [resolvedId];
          return MoveApi.searchListings(body);
        })
        .then(function (data) {
          var items = (data && data.items) || [];
          document.getElementById("results-status").remove();
          if (!items.length) {
            var empty = document.createElement("p");
            empty.className = "list-status";
            empty.textContent = "Nenhum resultado encontrado.";
            resultsRoot.appendChild(empty);
            return;
          }
          items.forEach(function (it) {
            resultsRoot.appendChild(renderListingCard(it));
          });
        })
        .catch(function (err) {
          var st = document.getElementById("results-status");
          if (st) {
            st.textContent =
              "Não foi possível carregar os resultados. Defina a URL da API em meta move-api-base ou window.MOVE_API_BASE.";
            st.classList.add("error");
          }
        });
    }

    function updateToolbar() {
      var p = getSearchParams();
      var catName = p.get("categoryName");
      var where = p.get("where") || "";
      var typeSlug = (p.get("type") || "").toLowerCase();
      var categoryId = p.get("categoryId");

      if (catName) {
        toolbarTitle.textContent = catName;
      } else if (categoryId) {
        toolbarTitle.textContent = "Resultados";
      } else if (typeSlug && titleByType[typeSlug]) {
        toolbarTitle.textContent = titleByType[typeSlug];
      } else {
        toolbarTitle.textContent = "Resultados por perto";
      }

      var subParts = [];
      if (where) subParts.push(where);
      var q = p.get("q");
      if (q) subParts.push('"' + q + '"');
      toolbarSub.textContent = subParts.length ? subParts.join(" · ") : "MOVE marketplace";
    }

    updateToolbar();
    syncOrderTagButtons();
    runSearch();

    orderTags.addEventListener("click", function (event) {
      var btn = event.target.closest(".tag");
      if (!btn) return;
      orderBy = btn.getAttribute("data-order") || "relevance";
      syncOrderTagButtons();
    });

    const overlay = document.getElementById("sheet-overlay");
    const sheet = document.getElementById("filter-sheet");

    function openSheet() {
      overlay.classList.add("open");
      sheet.classList.add("open");
    }

    function closeSheet() {
      overlay.classList.remove("open");
      sheet.classList.remove("open");
    }

    document.getElementById("open-filter").addEventListener("click", openSheet);
    document.getElementById("cancel-filter").addEventListener("click", closeSheet);
    document.getElementById("apply-filter").addEventListener("click", function () {
      closeSheet();
      var next = new URLSearchParams(window.location.search);
      next.set("orderBy", orderBy);
      window.history.replaceState({}, "", window.location.pathname + "?" + next.toString());
      runSearch();
    });
    overlay.addEventListener("click", closeSheet);
  </script>
</body>
</html>
